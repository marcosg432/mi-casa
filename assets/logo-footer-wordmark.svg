    SÍTIO
  </text>

  <!-- Linha esquerda (mais afastada) -->
  <line x1="80" y1="50" x2="200" y2="50" stroke="#FFFFFF" stroke-width="1.5"></line>

  <!-- Linha direita (mais afastada) -->
