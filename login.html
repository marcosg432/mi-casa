<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Login do Painel</title>
  <link rel="stylesheet" href="css/painel.css">
</head>
<body class="painel">
  <main style="min-height:100vh;display:grid;place-items:center;padding:1rem">
    <section class="sys-card" style="width:min(460px,100%);padding:1.2rem">
      <h1 class="sys-section-title" style="margin-bottom:1rem">Login administrativo</h1>
      <form id="login-form" class="sys-form">
        <label>Email</label>
        <input class="sys-input" id="login-email" type="email" autocomplete="username" required />
        <label>Senha</label>
        <input class="sys-input" id="login-senha" type="password" autocomplete="current-password" required />
        <button class="sys-btn" type="submit">Entrar</button>
      </form>
      <p id="login-erro" class="sys-help" style="color:#ffd2d2;display:none;margin-top:.8rem"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/guards.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
